name: Daily Stock Squeeze Screener (full scan)

# This is the "daily" stage: scans the FULL under-$20 universe once, near market
# open, and writes shortlist_cache.json (committed back to the repo) so the
# separate intraday workflow has something lightweight to re-check all day.

on:
  schedule:
    # 14:00 UTC = 9:00am US Eastern (adjust for your timezone / DST as needed;
    # cron is always UTC, and GitHub does not auto-adjust for daylight saving).
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed to commit the shortlist cache back to the repo

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full daily screen
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python screener.py --config config.yaml --mode daily

      - name: Commit updated cache files back to repo
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@github.com"
          git add shortlist_cache.json ticker_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update shortlist cache [skip ci]"
          git push || echo "Nothing to push"

      - name: Upload report + logs as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-screener-output-${{ github.run_number }}
          path: |
            latest_report.html
            screener.log
          retention-days: 30
