name: Daily Stock Squeeze Screener (full scan)

# This is the "daily" stage: scans the FULL under-$20 universe once, near market
# open, and writes shortlist_cache.json (committed back to the repo) so the
# separate intraday workflow has something lightweight to re-check all day.

on:
  schedule:
    # 14:00 UTC = 9:00am US Eastern (adjust for your timezone / DST as needed;
    # cron is always UTC, and GitHub does not auto-adjust for daylight saving).
    - cron: "0 14 * * 1-5"
  workflow_dispatch:      # manual trigger (Actions tab, or the UI's "Refresh Now" / "Analyze My List")
    inputs:
      tickers:
        description: "Optional comma-separated tickers for a custom on-demand analysis (e.g. AUTL,DVLT). Leave empty for the full-universe scan."
        required: false
        default: ""

permissions:
  contents: write   # needed to commit the shortlist cache + docs/data back to the repo
  issues: write     # needed to open alert issues (phone notifications) on matches

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # full universe is ~11k tickers now (was capped at 4k)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        # Needed before "Run" -- in custom (Analyze My List) mode the script
        # commits+pushes docs/data/progress.json mid-run so the UI's live
        # scan grid updates in real time.
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@github.com"

      - name: Run screen (full daily, or custom ticker list)
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          CUSTOM_TICKERS: ${{ github.event.inputs.tickers }}
        run: |
          if [ -n "$CUSTOM_TICKERS" ]; then
            python screener.py --config config.yaml --tickers "$CUSTOM_TICKERS"
          else
            python screener.py --config config.yaml --mode daily
          fi

      - name: Open alert issue when matches found (phone notification)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          [ -f alerts.json ] || { echo "No alerts.json -- nothing to notify."; exit 0; }
          python - << 'EOF'
          import json
          d = json.load(open("alerts.json", encoding="utf-8"))
          ts = d.get("tickers", [])
          rows = [f"| **{t['ticker']}** | ${t['current_price']} | ${t['expected_low']} - ${t['expected_high']} | ${t['year_low']} - ${t['year_high']} | {t['signals']} |" for t in ts]
          body = ("The daily scan found **%d TRIGGERED match(es)**:\n\n" % len(ts) +
                  "| Ticker | Price | Expected range (ATR) | 52-wk range | Signals |\n|---|---|---|---|---|\n" +
                  "\n".join(rows) +
                  "\n\n[Open the dashboard](https://dhavalkodrani.github.io/Stock_squeeze_screener/)\n\n*Automated technical screen -- not financial advice. Verify independently.*")
          open("issue_body.md","w",encoding="utf-8").write(body)
          open("alert_tickers.txt","w").write(",".join(t["ticker"] for t in ts))
          EOF
          TICKERS=$(cat alert_tickers.txt)
          [ -z "$TICKERS" ] && { echo "No matches -- no alert."; exit 0; }
          TITLE="🔔 Squeeze alert $(date -u +%Y-%m-%d): $TICKERS"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[].number' | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Alert issue #$EXISTING already open, skipping."
          else
            gh issue create --title "$TITLE" --body-file issue_body.md --assignee "$OWNER"
          fi

      - name: Commit updated cache + dashboard data back to repo
        if: always()
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@github.com"
          rm -f alerts.json alert_tickers.txt issue_body.md
          git add shortlist_cache.json ticker_state.json docs/data/results.json docs/data/custom_results.json docs/data/progress.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update cache + dashboard data [skip ci]"
          git pull --rebase || true
          git push || echo "Nothing to push"

      - name: Upload report + logs as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-screener-output-${{ github.run_number }}
          path: |
            latest_report.html
            screener.log
          retention-days: 30
