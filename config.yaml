# =============================================================================
# Stock Squeeze Screener - Configuration
# All thresholds here are adjustable without touching the Python code.
# =============================================================================

universe:
  # Where to pull the master list of US tickers from, tried in order:
  #   1. NASDAQ Trader symbol directory -- unreachable from cloud runners in
  #      practice (times out), kept as first attempt in case that changes.
  #   2. SEC EDGAR company_tickers.json -- reliable everywhere, ~11k tickers.
  #      Requires a descriptive User-Agent per SEC fair-access policy.
  #   3. Local file (fallback_file) as a last resort.
  nasdaq_listed_url: "https://ftp.nasdaqtrader.com/dynamic/SymDir/nasdaqlisted.txt"
  other_listed_url: "https://ftp.nasdaqtrader.com/dynamic/SymDir/otherlisted.txt"
  sec_company_tickers_url: "https://www.sec.gov/files/company_tickers.json"
  sec_user_agent: "StockSqueezeScreener dhavalmountlaurel@gmail.com"
  fallback_file: "tickers_fallback.txt"
  # Exclude test issues, warrants, units, and other non-common-stock symbols
  exclude_test_issues: true
  exclude_symbols_with_chars: [".", "$", "+", "^", "="]   # typically warrants/rights/units
  # Safety cap on how many tickers to actually download OHLCV for in one run.
  # Set above the full universe size (~11k) so ALL tickers are scanned.
  max_tickers_per_run: 20000

price_filter:
  max_price: 1000000       # effectively no upper cap -- shortlist stocks at any price
  min_price: 1.00          # only stocks trading above $1
  min_avg_dollar_volume: 100000   # liquidity floor: avg_volume * price, last 20 days

data:
  lookback_days: 260        # ~1 trading year of daily bars, needed for 52wk hi/lo
  history_period: "1y"      # yfinance period string
  interval: "1d"
  batch_size: 50            # tickers per yfinance download batch
  max_retries: 3
  retry_backoff_seconds: 5

# Intraday / live-market settings -- only used when run_mode: "intraday"
intraday:
  interval: "5m"             # yfinance intraday granularity: "5m", "15m", "1h"
  lookback_period: "5d"      # yfinance limits 5m bars to the last 60 days; 5d is plenty for our indicators
  min_bars_required: 40      # minimum intraday bars needed before evaluating (safety floor)

# Two-stage run mode:
#   "daily"    -> full-universe scan on daily bars (run once, e.g. at/near market open),
#                 writes the shortlist + each ticker's 52wk high/low to cache.
#   "intraday" -> re-checks ONLY the cached shortlist using 5-min bars (run every 5-15 min
#                 during market hours). Reuses cached 52wk hi/lo instead of re-fetching 1y history.
run_mode: "daily"

cache:
  enabled: true
  shortlist_file: "shortlist_cache.json"   # tickers + 52wk hi/lo from the last daily scan
  state_file: "ticker_state.json"          # which tickers currently match, for change detection
  max_cache_age_hours: 20                  # daily cache considered stale after this long

bollinger:
  period: 20
  num_std: 2.0
  # "Squeeze" = current band-width is at/near the tightest it's been recently
  squeeze_lookback_days: 120
  squeeze_percentile: 10    # current bandwidth must be <= this percentile of the lookback window

trend:
  fast_ma: 10
  slow_ma: 30
  # require price above fast MA and fast MA above slow MA to call it an "uptrend"
  require_price_above_fast_ma: true
  require_fast_above_slow_ma: true

volume:
  short_avg_days: 5
  long_avg_days: 20
  # volume must be contracting into the squeeze, then show signs of expanding again
  contraction_ratio_max: 0.85   # short_avg / long_avg <= this at some point in lookback = contraction happened
  expansion_multiplier: 1.15    # latest volume >= long_avg * this = expansion happening now
  require_volume_confirmation: true
  # Volume spike: the latest bar's volume must be at least spike_multiplier x
  # the PREVIOUS day's volume, OR spike_multiplier x the average of the prior
  # spike_compare_days days. The measured ratios always appear in Notes.
  # Applied to daily scans only (meaningless on 5-minute intraday bars).
  require_volume_spike: true
  spike_multiplier: 2.0
  spike_compare_days: 3

rsi_rise:
  # RSI must have RISEN by at least min_rise points over the last
  # lookback_days trading days. The measured rise always appears in Notes.
  # Applied to daily scans only.
  required: true
  period: 14
  lookback_days: 5
  min_rise: 10

projection:
  # "Expected low/high range" is a heuristic technical projection based on
  # Average True Range (ATR), NOT a prediction or guarantee of future price.
  atr_period: 14
  atr_multiplier: 1.5

enrichment:
  # Extra per-result info fetched only for tickers that made the report
  # (never the whole universe): trailing-12-month dividend and the next
  # earnings report date. "Near" earnings get flagged in the notes.
  enabled: true
  earnings_near_days: 14   # flag "result nearby" when earnings within this many days
  max_tickers: 100         # safety cap on extra lookups per run

confirmations:
  # Secondary indicator votes, applied only to tickers that already passed
  # the core filters (price cap, Bollinger squeeze, SMA trend, volume
  # contraction/expansion). Each enabled indicator casts one bullish yes/no
  # vote; a ticker needs at least min_required votes to make the report.
  # Every vote (pass/fail + value) is saved to results.json so the UI can
  # show why a ticker qualified. Disable any indicator with enabled: false.
  min_required: 5

  rsi:                    # Relative Strength Index
    enabled: true
    period: 14
    min: 50               # bullish side of the range...
    max: 75               # ...but not already overbought
  macd:                   # MACD line above its signal line
    enabled: true
    fast: 12
    slow: 26
    signal: 9
  momentum:               # N-day rate of change must be positive
    enabled: true
    period: 10
  lsma:                   # price above a rising least-squares (linear regression) MA
    enabled: true
    period: 25
  ema:                    # price above the exponential MA
    enabled: true
    period: 21
  ichimoku:               # price above the Ichimoku cloud (span A/B)
    enabled: true
    conversion: 9
    base: 26
    span_b: 52
  vwap:                   # price above rolling volume-weighted average price
    enabled: true
    period: 20
  mfi:                    # Money Flow Index (volume-weighted RSI), bullish band
    enabled: true
    period: 14
    min: 50
    max: 85

email:
  subject_prefix: "[Stock Squeeze Screener]"
  smtp_server_env: "SMTP_SERVER"        # e.g. smtp.gmail.com
  smtp_port_env: "SMTP_PORT"            # e.g. 587
  sender_email_env: "EMAIL_ADDRESS"
  sender_password_env: "EMAIL_PASSWORD" # use an app password, not your real password
  recipient_email_env: "EMAIL_RECIPIENT"
  send_email_if_no_hits: false          # if true, sends a "no matches today" email too
  email_on_changes_only: true           # intraday mode: only email when a ticker newly enters/exits the setup

output:
  # Written on every run so the GitHub Pages UI always has fresh data.
  results_json_path: "docs/data/results.json"
  html_report_path: "latest_report.html"
  # On-demand custom ticker-list analyses (the UI's "Analyze My List" box /
  # --tickers CLI flag) write here so the daily results.json is never
  # overwritten by a custom run.
  custom_results_json_path: "docs/data/custom_results.json"
  # Live scan progress for the UI's "Refresh Now" view -- the script commits
  # this small file periodically while scanning and the UI polls it.
  progress_json_path: "docs/data/progress.json"
  progress_commit_min_interval_seconds: 20
  # Dated snapshots of each daily full scan for the UI's History tab /
  # back-testing (one JSON per day + an index of available dates).
  history_dir: "docs/data/history"

logging:
  level: "INFO"
  file: "screener.log"
